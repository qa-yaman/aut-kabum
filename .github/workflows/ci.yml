name: CI + Allure Report Deploy

on:
  push:
    branches:
      - main
      - hml
  pull_request:
    branches:
      - main
      - hml
  workflow_dispatch:

concurrency:
  group: allure-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  bdd-pipelines:
    name: BDD pipeline (${{ matrix.pipeline }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - pipeline: smoke
            tag: smoke
            expression: "@smoke and not @blocked and not @bloqueado and not @flaky"
          - pipeline: regression
            tag: regression
            expression: "@regression and not @blocked and not @bloqueado and not @flaky"
          - pipeline: critical
            tag: critical
            expression: "@critical and not @blocked and not @bloqueado and not @flaky"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Verify pipeline has tagged scenarios
        id: pipeline_check
        run: |
          TAG="@${{ matrix.tag }}"
          if grep -RIn "$TAG" src/test/resources/features; then
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
            echo "Pipeline ${{ matrix.pipeline }}: tagged scenarios found for $TAG"
          else
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
            echo "Pipeline ${{ matrix.pipeline }}: no tagged scenarios for $TAG (skipping run)"
          fi

      - name: Run tests for pipeline
        if: steps.pipeline_check.outputs.has_tests == 'true'
        run: |
          mvn -B clean test -Dheadless=true -Dmaven.test.failure.ignore=true -Dskip.open.allure=true -Dcucumber.filter.tags="${{ matrix.expression }}"

      - name: Upload pipeline Surefire reports
        if: always() && steps.pipeline_check.outputs.has_tests == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-${{ matrix.pipeline }}
          path: target/surefire-reports
          if-no-files-found: ignore

      - name: Upload pipeline Allure results
        if: always() && steps.pipeline_check.outputs.has_tests == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.pipeline }}
          path: allure-results
          if-no-files-found: ignore

  tag-governance:
    name: BDD tag governance (blocked/flaky)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate governance tags inventory
        run: |
          set -euo pipefail

          echo "=== TAG INVENTORY ==="
          grep -RInE "@(smoke|regression|critical|blocked|bloqueado|flaky)" src/test/resources/features || true

          BLOCKED_COUNT=$(grep -RInE "@blocked|@bloqueado" src/test/resources/features | wc -l || true)
          FLAKY_COUNT=$(grep -RInE "@flaky" src/test/resources/features | wc -l || true)

          echo "Blocked scenarios found: ${BLOCKED_COUNT}"
          echo "Flaky scenarios found: ${FLAKY_COUNT}"

          # Governança: informar presença de cenários não elegíveis para pipelines críticos
          if [ "${BLOCKED_COUNT}" -gt 0 ]; then
            echo "::warning::Existem cenarios @blocked/@bloqueado. Eles sao excluidos das pipelines smoke/regression/critical."
          fi
          if [ "${FLAKY_COUNT}" -gt 0 ]; then
            echo "::warning::Existem cenarios @flaky. Eles sao excluidos das pipelines smoke/regression/critical."
          fi

  build-and-report:
    name: Build, Test and Publish Allure
    needs: [bdd-pipelines, tag-governance]
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Show tool versions
        run: |
          java -version
          mvn -version

      - name: Lint guard - block implicit wait usage
        run: |
          set -euo pipefail

          if grep -RInE "implicitlyWait[[:space:]]*\(" src/test/java; then
            echo "::error::Uso de implicit wait detectado. Padrao do projeto exige apenas waits explicitos."
            exit 1
          fi

          echo "Lint guard OK: nenhum implicit wait encontrado."

      - name: Lint guard - resilient locators policy
        run: |
          set -euo pipefail

          TARGET_BRANCH="${GITHUB_BASE_REF:-$GITHUB_REF_NAME}"
          ROOT="src/test/java/pages"

          if [ "$TARGET_BRANCH" != "hml" ]; then
            echo "Policy de locators resilientes habilitada apenas para a branch hml. Branch atual: '$TARGET_BRANCH'."
            exit 0
          fi

          # Regra: priorizar data-testid e evitar seletores por texto solto/XPath textual.
          # Excecao: incluir comentario "LOCATOR_ALLOW_TEXT" na mesma linha para casos justificados.
          MATCHES=$(grep -RInE "By\.xpath\(|clicarElementoPorTexto\(" "$ROOT" | grep -v "LOCATOR_ALLOW_TEXT" || true)

          if [ -n "$MATCHES" ]; then
            echo "::warning::Locators potencialmente frageis encontrados (texto solto/XPath):"
            echo "$MATCHES"
            echo "::error::Policy de locators resilientes violada na branch hml. Use data-testid como prioridade."
            exit 1
          else
            echo "Lint guard OK: nenhum locator fragil detectado em $ROOT."
          fi

      - name: Check Chrome availability
        run: |
          google-chrome --version || chromium-browser --version || chromium --version

      - name: Set quality gates by environment
        run: |
          TARGET_BRANCH="${GITHUB_BASE_REF:-$GITHUB_REF_NAME}"
          echo "Target branch for gates: ${TARGET_BRANCH}"

          if [ "${TARGET_BRANCH}" = "main" ]; then
            echo "MIN_SUCCESS_RATE=0.98" >> "$GITHUB_ENV"
            echo "MAX_SUITE_SECONDS=480" >> "$GITHUB_ENV"
            echo "MAX_RECURRENT_UNSTABLE=0" >> "$GITHUB_ENV"
          elif [ "${TARGET_BRANCH}" = "hml" ]; then
            echo "MIN_SUCCESS_RATE=0.90" >> "$GITHUB_ENV"
            echo "MAX_SUITE_SECONDS=900" >> "$GITHUB_ENV"
            echo "MAX_RECURRENT_UNSTABLE=1" >> "$GITHUB_ENV"
          else
            # Fallback para outras branches (feature/hotfix)
            echo "MIN_SUCCESS_RATE=0.90" >> "$GITHUB_ENV"
            echo "MAX_SUITE_SECONDS=900" >> "$GITHUB_ENV"
            echo "MAX_RECURRENT_UNSTABLE=1" >> "$GITHUB_ENV"
          fi

      - name: Show quality gate thresholds
        run: |
          echo "MIN_SUCCESS_RATE=${MIN_SUCCESS_RATE}"
          echo "MAX_SUITE_SECONDS=${MAX_SUITE_SECONDS}"
          echo "MAX_RECURRENT_UNSTABLE=${MAX_RECURRENT_UNSTABLE}"

      - name: Set metrics context
        run: |
          TARGET_BRANCH="${GITHUB_BASE_REF:-$GITHUB_REF_NAME}"
          echo "TARGET_BRANCH=${TARGET_BRANCH}" >> "$GITHUB_ENV"
          echo "METRICS_WINDOW=100" >> "$GITHUB_ENV"
          echo "RUN_TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Clean old Allure artifacts
        run: rm -rf allure-results allure-report

      - name: Run tests
        run: mvn -B clean test -Dheadless=true -Dmaven.test.failure.ignore=true -Dskip.open.allure=true -Dcucumber.filter.tags="not @blocked and not @bloqueado and not @flaky"

      - name: Validate Allure results
        run: |
          test -d allure-results
          test "$(find allure-results -type f | wc -l)" -gt 0

      - name: Install Allure
        run: npm install -g allure-commandline --save-dev

      - name: Generate Allure report
        run: allure generate allure-results --clean -o allure-report

      - name: Quality gates (success rate, suite duration, flaky recurrence)
        run: |
          python3 - << 'PY'
          import glob
          import os
          import sys
          import xml.etree.ElementTree as ET
          from collections import Counter

          min_success_rate = float(os.getenv("MIN_SUCCESS_RATE", "0.95"))
          max_suite_seconds = float(os.getenv("MAX_SUITE_SECONDS", "600"))
          max_recurrent_unstable = int(os.getenv("MAX_RECURRENT_UNSTABLE", "0"))

          report_files = sorted(glob.glob("target/surefire-reports/*.xml"))
          if not report_files:
            print("::error::Nenhum arquivo em target/surefire-reports para aplicar quality gates.")
            sys.exit(1)

          total = failures = errors = skipped = 0
          max_suite_time = 0.0
          failed_occurrences = Counter()
          flaky_count = 0

          for path in report_files:
            try:
              root = ET.parse(path).getroot()
            except ET.ParseError:
              continue

            suites = [root] if root.tag == "testsuite" else root.findall("testsuite")
            for suite in suites:
              total += int(suite.attrib.get("tests", 0))
              failures += int(suite.attrib.get("failures", 0))
              errors += int(suite.attrib.get("errors", 0))
              skipped += int(suite.attrib.get("skipped", 0))
              max_suite_time = max(max_suite_time, float(suite.attrib.get("time", 0.0)))

              for case in suite.findall("testcase"):
                name = f"{case.attrib.get('classname','?')}#{case.attrib.get('name','?')}"

                if case.find("failure") is not None or case.find("error") is not None:
                  failed_occurrences[name] += 1

                if case.find("flakyFailure") is not None or case.find("flakyError") is not None:
                  flaky_count += 1

          executed = max(total - skipped, 0)
          passed = max(executed - failures - errors, 0)
          success_rate = (passed / executed) if executed > 0 else 0.0

          recurrent_failed = sum(1 for _, cnt in failed_occurrences.items() if cnt > 1)
          recurrent_unstable = recurrent_failed + flaky_count

          print("=== QUALITY GATES SUMMARY ===")
          print(f"Total: {total} | Executed: {executed} | Passed: {passed} | Failures: {failures} | Errors: {errors} | Skipped: {skipped}")
          print(f"Success rate: {success_rate:.2%} (min: {min_success_rate:.2%})")
          print(f"Max suite duration: {max_suite_time:.2f}s (max: {max_suite_seconds:.2f}s)")
          print(f"Recurrent unstable: {recurrent_unstable} (max: {max_recurrent_unstable})")

          reasons = []
          if success_rate < min_success_rate:
            reasons.append(
              f"Taxa de sucesso abaixo do minimo: {success_rate:.2%} < {min_success_rate:.2%}"
            )
          if max_suite_time > max_suite_seconds:
            reasons.append(
              f"Suite excedeu tempo maximo: {max_suite_time:.2f}s > {max_suite_seconds:.2f}s"
            )
          if recurrent_unstable > max_recurrent_unstable:
            reasons.append(
              f"Instabilidade recorrente acima do limite: {recurrent_unstable} > {max_recurrent_unstable}"
            )

          if reasons:
            for reason in reasons:
              print(f"::error::{reason}")
            sys.exit(1)

          print("Quality gates aprovados.")
          PY

      - name: Checkout gh-pages history
        if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'hml')
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages-history

      - name: Build historical metrics and dashboard
        if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'hml')
        run: |
          python3 scripts/metrics_dashboard.py \
            --branch "${TARGET_BRANCH}" \
            --run-id "${GITHUB_RUN_ID}" \
            --run-number "${GITHUB_RUN_NUMBER}" \
            --sha "${GITHUB_SHA}" \
            --timestamp "${RUN_TS}" \
            --window "${METRICS_WINDOW}" \
            --surefire-glob "target/surefire-reports/*.xml" \
            --history-root "gh-pages-history/metrics" \
            --current-out "metrics/current/run.json" \
            --publish-root "metrics/publish"

      - name: Prepare publish site
        if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'hml')
        run: |
          mkdir -p site/allure
          cp -R allure-report/. site/allure/
          cp -R metrics/publish/. site/

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports
          if-no-files-found: ignore

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
          if-no-files-found: ignore

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          if-no-files-found: warn
          retention-days: 14

      - name: Upload metrics dashboard artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: metrics-dashboard
          path: metrics/publish
          if-no-files-found: ignore

      - name: Deploy main report to GitHub Pages
        if: github.event_name == 'push' && github.ref_name == 'main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          keep_files: true

      - name: Deploy hml report to GitHub Pages
        if: github.event_name == 'push' && github.ref_name == 'hml'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          destination_dir: hml
          keep_files: true
