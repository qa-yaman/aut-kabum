name: CI + Allure Report Deploy

on:
  push:
    branches:
      - main
      - hml
  pull_request:
    branches:
      - main
      - hml
  workflow_dispatch:

concurrency:
  group: allure-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-report:
    name: Build, Test and Publish Allure
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Show tool versions
        run: |
          java -version
          mvn -version

      - name: Check Chrome availability
        run: |
          google-chrome --version || chromium-browser --version || chromium --version

      - name: Clean old Allure artifacts
        run: rm -rf allure-results allure-report

      - name: Run tests
        run: mvn -B clean test -Dheadless=true

      - name: Validate Allure results
        run: |
          test -d allure-results
          test "$(find allure-results -type f | wc -l)" -gt 0

      - name: Install Allure
        run: npm install -g allure-commandline --save-dev

      - name: Generate Allure report
        run: allure generate allure-results --clean -o allure-report

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports
          if-no-files-found: ignore

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
          if-no-files-found: ignore

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          if-no-files-found: error
          retention-days: 14

      - name: Deploy main report to GitHub Pages
        if: github.event_name == 'push' && github.ref_name == 'main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          publish_branch: gh-pages
          keep_files: true

      - name: Deploy hml report to GitHub Pages
        if: github.event_name == 'push' && github.ref_name == 'hml'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          publish_branch: gh-pages
          destination_dir: hml
          keep_files: true
