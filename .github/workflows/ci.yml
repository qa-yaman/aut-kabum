name: CI + Allure Report Deploy

on:
  push:
    branches:
      - main
      - hml
  pull_request:
    branches:
      - main
      - hml
  workflow_dispatch:

concurrency:
  group: allure-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-report:
    name: Build, Test and Publish Allure
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Show tool versions
        run: |
          java -version
          mvn -version

      - name: Check Chrome availability
        run: |
          google-chrome --version || chromium-browser --version || chromium --version

      - name: Clean old Allure artifacts
        run: rm -rf allure-results allure-report

      - name: Run tests
        run: mvn -B clean test -Dheadless=true

      - name: Check Allure results
        if: always()
        id: allure-results
        env:
          IS_HML_TARGET: ${{ github.ref_name == 'hml' || github.base_ref == 'hml' }}
        run: |
          if [ -d allure-results ] && [ "$(find allure-results -type f | wc -l)" -gt 0 ]; then
            echo "has_results=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_results=false" >> "$GITHUB_OUTPUT"
            if [ "$IS_HML_TARGET" = "true" ]; then
              echo "Allure results are mandatory for hml."
              exit 1
            fi
            echo "No Allure results were generated; skipping report generation."
          fi

      - name: Install Allure
        if: always() && steps.allure-results.outputs.has_results == 'true'
        run: npm install -g allure-commandline --save-dev

      - name: Generate Allure report
        if: always() && steps.allure-results.outputs.has_results == 'true'
        run: allure generate allure-results --clean -o allure-report

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports
          if-no-files-found: ignore

      - name: Upload Allure results
        if: always() && steps.allure-results.outputs.has_results == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
          if-no-files-found: ignore

      - name: Upload Allure report
        if: always() && steps.allure-results.outputs.has_results == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          if-no-files-found: error
          retention-days: 14

      - name: Deploy main report to GitHub Pages
        if: github.event_name == 'push' && github.ref_name == 'main' && steps.allure-results.outputs.has_results == 'true'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          publish_branch: gh-pages
          keep_files: true

      - name: Deploy hml report to GitHub Pages
        if: github.event_name == 'push' && github.ref_name == 'hml' && steps.allure-results.outputs.has_results == 'true'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          publish_branch: gh-pages
          destination_dir: hml
          keep_files: true
